<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <script src="app.js" defer></script>
    <title>Template tela de Cadastro</title>
</head>
<body>
    <h1>Cadastro</h1>
    <form action="" method="post">
        <label for="name">Nome</label>
        <input type="text" name="name" id="name" required placeholder="Seu nome"><br>

        <label for="lastName">Sobrenome</label>
        <input type="text" name="lastName" id="lastName" required placeholder="Seu sobrenome"><br>

        <label for="phoneNumber">Telefone</label>
        <input type="text" id="phoneNumber" name="phoneNumber" placeholder="Seu telefone"><br>

        <label for="birthDate">Data de Nascimento</label>
        <input type="text" name="birthDate" id="birthDate" placeholder="Sua data de nascimento aqui"><br>
        
        <label for="CPF">CPF</label>
        <input type="text" name="CPF" id="CPF" required placeholder="Seu CPF aqui" onkeyup="validarCPF()">
        <label id="checkCPF"></label>
        
        <label for="email">Email</label>
        <input type="email" name="email" id="email" required placeholder="Seu email" onkeyup="validarEmail()">
        
        <label for="validateEmail">Confirme o email</label>
        <input type="email" name="validateEmail" id="validateEmail" required placeholder="Confirme o email" onkeyup="validarCEmail()">
        <label id="checkEmailMessage"></label>

        <label for="password">Senha</label>
        <input type="password" id="password" placeholder="Insira a senha" onkeyup="validatePassword()">
        <label id="label8characters" class="passwordAtributes">*Pelo menos 8 caracteres</label>
        <label id="label1MajorLetter" class="passwordAtributes">*Pelo menos 1 letra maiúscula</label>
        <label id="label1Number" class="passwordAtributes">*Pelo menos 1 número</label>
        <label id="label1Special" class="passwordAtributes">*Pelo menos 1 caracter especial (*&%$@#...)</label>

        <label for="confirmPassword">Confirme a senha</label>
        <input type="password" id="confirmPassword" placeholder="Confirme a senha" onkeyup="checkPassword()">
        <label id="cPMessage"></label>
        
        <label for="CEP">CEP</label>
        <input type="text" name="CEP" id="CEP" required placeholder="Seu CEP aqui" >
        <input type="button" value="Buscar" onclick="consultaCEP()"><br>

        <label for="street">Rua</label>
        <input type="text" name="street" id="street">
        <label for="houseNumber">Número:</label>
        <input type="number" name="houseNumber" id="houseNumber" required>
        <label for="complement">Complemento:</label>
        <input type="text" id="complement"><br>

        <label for="neighborhood">Bairro</label>
        <input type="text" id="neighborhood">
        <label for="city">Cidade</label>
        <input type="text" id="city">
        <label for="UF">UF</label>
        <input type="text" id="UF">
        <br>

        <button type="submit">Cadastrar</button>
    </form>


    <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.js"></script>

    <script>
        $('#phoneNumber').mask('(00) 00000-0000');
        $('#birthDate').mask('00/00/0000');
        $('#CPF').mask('000.000.000-00', {reverse: true});
        $('#CEP').mask('00000-000');
    </script>

</body>
</html>
